<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>渊博579 管理后台</title>
<link rel="icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--border:#475569;--pri:#4f6ef7;--pri2:#6366f1;
--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--cyan:#06b6d4;
--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--radius:10px;--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .25s ease}
.app{display:flex;height:100%;padding-top:var(--safe-top)}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:transform .3s}
.sidebar .logo{padding:16px;text-align:center;font-size:18px;font-weight:700;color:var(--pri);border-bottom:1px solid var(--border)}
.sidebar .logo small{display:block;font-size:11px;color:var(--text2);font-weight:400}
.nav-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text2);transition:.15s;font-size:13px;border-left:3px solid transparent}
.nav-item:hover{background:rgba(79,110,247,.1);color:var(--text)}
.nav-item.active{background:rgba(79,110,247,.15);color:var(--pri);border-left-color:var(--pri);font-weight:600}
.nav-group{padding:8px 16px 4px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.header .menu-btn{display:none;font-size:20px;cursor:pointer;padding:4px}
.header .title{font-size:16px;font-weight:600;flex:1}
.header .user-info{display:flex;align-items:center;gap:8px;font-size:13px}
.header .badge{background:var(--pri);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(16px + var(--safe-bottom))}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border);text-align:center}
.stat .num{font-size:28px;font-weight:700;color:var(--pri)}
.stat .label{font-size:12px;color:var(--text2);margin-top:4px}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:4px}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:var(--pri2)}
.btn-green{background:var(--green);color:#fff}.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--text2)}
.btn-sm{padding:4px 10px;font-size:12px}
.table-wrap{overflow-x:auto;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--card2);padding:8px 10px;text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:7px 10px;border-top:1px solid var(--border);white-space:nowrap}
tr:hover td{background:rgba(79,110,247,.05)}
.badge-s{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block}
.bg-green{background:rgba(34,197,94,.15);color:var(--green)}
.bg-red{background:rgba(239,68,68,.15);color:var(--red)}
.bg-yellow{background:rgba(234,179,8,.15);color:var(--yellow)}
.bg-blue{background:rgba(79,110,247,.15);color:var(--pri)}
.bg-cyan{background:rgba(6,182,212,.15);color:var(--cyan)}
.bg-orange{background:rgba(249,115,22,.15);color:var(--orange)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:12px;padding:20px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid var(--border)}
.modal h3{margin-bottom:12px;font-size:16px}
.form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.form-field{flex:1;min-width:140px}
.form-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px}
.form-field textarea{resize:vertical;min-height:60px}
.tabs{display:flex;gap:2px;margin-bottom:12px;overflow-x:auto}
.tab{padding:7px 14px;cursor:pointer;border-radius:6px;font-size:13px;color:var(--text2);white-space:nowrap;transition:.15s}
.tab.active{background:var(--pri);color:#fff}
.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;margin:1px}
.search-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-bar input,.search-bar select{flex:1;min-width:200px;padding:7px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px}
.search-bar input:focus,.search-bar select:focus{outline:none;border-color:var(--pri)}
.toast{position:fixed;top:16px;right:16px;padding:10px 20px;border-radius:8px;color:#fff;z-index:200;animation:fadeIn .3s}
.empty{text-align:center;padding:40px;color:var(--text3)}
.info-card{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.info-item{padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.info-item .label{font-size:11px;color:var(--text3);margin-bottom:4px}
.info-item .value{font-size:14px;font-weight:600}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.sidebar-footer a,.sidebar-footer button{display:flex;align-items:center;gap:6px;padding:8px 10px;font-size:13px;border-radius:6px;cursor:pointer;transition:.15s;text-decoration:none;border:none;background:transparent;color:var(--text2);width:100%;text-align:left}
.sidebar-footer a:hover,.sidebar-footer button:hover{background:rgba(79,110,247,.1);color:var(--text)}
.perm-grid{display:grid;gap:2px}
.perm-row{display:flex;align-items:center;gap:4px;padding:4px 0}
.perm-check{width:18px;height:18px;accent-color:var(--pri);cursor:pointer}
.denied-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;text-align:center}
.denied-page h2{color:var(--red);font-size:24px}
.denied-page a{color:var(--pri);text-decoration:underline}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;display:none}
  .sidebar-mask.show{display:block}
  .header .menu-btn{display:block}
  .stats{grid-template-columns:repeat(2,1fr)}
  .content{padding:12px}
  .form-row{flex-direction:column}
  .form-field{min-width:100%}
  .table-wrap{overflow:visible}
  table,thead,tbody,tr,th,td{display:block}
  thead{display:none}
  tr{border:1px solid var(--border);border-radius:10px;background:var(--card);padding:8px 10px;margin-bottom:10px}
  td{padding:6px 0;border-top:none;white-space:normal}
  td:not(:last-child){border-bottom:1px dashed rgba(148,163,184,.22)}
}
@media print{.sidebar,.header{display:none!important}.content{padding:0!important}}
</style>
</head>
<body>
<div id="toast" class="toast" style="display:none"></div>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

/* ── Toast ── */
let toastTimer;
function showToast(msg, type='success'){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type === 'success' ? 'var(--green)' : 'var(--red)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = 'none', 2500);
}

/* ── API Helper ── */
const API = {
  token: localStorage.getItem('hr_token') || '',
  setToken(t){ this.token = t; localStorage.setItem('hr_token', t); },
  async req(method, url, body){
    const opt = {method, headers: {'Content-Type':'application/json'}};
    if(this.token) opt.headers['Authorization'] = 'Bearer ' + this.token;
    if(body) opt.body = JSON.stringify(body);
    const r = await fetch(url, opt);
    if(r.status === 401){
      this.setToken('');
      localStorage.removeItem('hr_user');
      window.location.href = '/index.html';
      return null;
    }
    const data = await r.json().catch(() => ({}));
    if(!r.ok){ showToast(data.detail || '操作失败', 'error'); return null; }
    return data;
  },
  get(u){ return this.req('GET', u); },
  post(u, b){ return this.req('POST', u, b); },
  put(u, b){ return this.req('PUT', u, b); },
  delete(u){ return this.req('DELETE', u); },
};

/* ─────────────── Dashboard ─────────────── */
function Dashboard(){
  const [stats, setStats] = useState({employees:0, accounts:0, warehouses:0, regions:0});
  const [logs, setLogs] = useState([]);

  useEffect(() => {
    Promise.all([
      API.get('/api/employees'),
      API.get('/api/accounts'),
      API.get('/api/warehouses'),
      API.get('/api/regions'),
      API.get('/api/logs'),
    ]).then(([emp, acc, wh, rg, lg]) => {
      setStats({
        employees: Array.isArray(emp) ? emp.length : 0,
        accounts: Array.isArray(acc) ? acc.length : 0,
        warehouses: Array.isArray(wh) ? wh.length : 0,
        regions: Array.isArray(rg) ? rg.length : 0,
      });
      setLogs(Array.isArray(lg) ? lg.slice(0, 30) : []);
    });
  }, []);

  return (
    <div className="fade">
      <h2 style={{marginBottom:16}}>📊 系统概览</h2>
      <div className="stats">
        <div className="stat"><div className="num">{stats.employees}</div><div className="label">员工总数</div></div>
        <div className="stat"><div className="num">{stats.accounts}</div><div className="label">系统账号</div></div>
        <div className="stat"><div className="num">{stats.warehouses}</div><div className="label">仓库数量</div></div>
        <div className="stat"><div className="num">{stats.regions}</div><div className="label">大区数量</div></div>
      </div>
      <div className="card">
        <h3 style={{marginBottom:8}}>最近操作日志</h3>
        {logs.length === 0 ? <div className="empty">暂无日志</div> : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>时间</th><th>用户</th><th>操作</th><th>类型</th><th>详情</th></tr></thead>
              <tbody>
                {logs.map(l => (
                  <tr key={l.id}>
                    <td>{l.timestamp ? new Date(l.timestamp).toLocaleString('zh-CN') : '-'}</td>
                    <td>{l.username}</td>
                    <td>{l.action}</td>
                    <td><span className="badge-s bg-blue">{l.resource_type}</span></td>
                    <td style={{maxWidth:260,overflow:'hidden',textOverflow:'ellipsis'}}>{l.details || '-'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─────────────── Account Management ─────────────── */
function Accounts(){
  const [accounts, setAccounts] = useState([]);
  const [search, setSearch] = useState('');
  const [showCreate, setShowCreate] = useState(false);
  const [resetTarget, setResetTarget] = useState(null);
  const [newPwd, setNewPwd] = useState('');
  const [form, setForm] = useState({username:'', password:'', role:'user', display_name:'', employee_id:'', warehouse_code:''});

  const load = () => API.get('/api/accounts').then(d => { if(d) setAccounts(d); });
  useEffect(() => { load(); }, []);

  const filtered = accounts.filter(a =>
    (a.username||'').includes(search) || (a.display_name||'').includes(search)
  );

  const handleCreate = async () => {
    if(!form.username || !form.password){ showToast('用户名和密码必填','error'); return; }
    const r = await API.post('/api/accounts/generate', form);
    if(r){ showToast('账号已创建'); setShowCreate(false); setForm({username:'',password:'',role:'user',display_name:'',employee_id:'',warehouse_code:''}); load(); }
  };

  const handleToggle = async (username) => {
    const r = await API.put('/api/accounts/'+encodeURIComponent(username)+'/toggle');
    if(r){ showToast('状态已更新'); load(); }
  };

  const handleResetPwd = async () => {
    if(!newPwd){ showToast('请输入新密码','error'); return; }
    const r = await API.post('/api/accounts/reset-password', {username: resetTarget, new_password: newPwd});
    if(r){ showToast('密码已重置'); setResetTarget(null); setNewPwd(''); }
  };

  const handleDelete = async (username) => {
    if(!confirm('确定删除账号 '+username+' ?')) return;
    const r = await API.delete('/api/accounts/'+encodeURIComponent(username));
    if(r){ showToast('账号已删除'); load(); }
  };

  return (
    <div className="fade">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <h2>👤 账号管理</h2>
        <button className="btn btn-pri" onClick={() => setShowCreate(true)}>+ 新建账号</button>
      </div>
      <div className="search-bar">
        <input placeholder="搜索用户名 / 显示名..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>用户名</th><th>显示名</th><th>角色</th><th>员工ID</th><th>仓库</th><th>状态</th><th>PIN</th><th>操作</th></tr></thead>
            <tbody>
              {filtered.map(a => (
                <tr key={a.username}>
                  <td style={{fontWeight:600}}>{a.username}</td>
                  <td>{a.display_name || '-'}</td>
                  <td><span className="badge-s bg-blue">{a.role}</span></td>
                  <td>{a.employee_id || '-'}</td>
                  <td>{a.warehouse_code || '-'}</td>
                  <td><span className={'badge-s '+(a.is_active!==false?'bg-green':'bg-red')}>{a.is_active!==false?'启用':'停用'}</span></td>
                  <td>{a.pin || '-'}</td>
                  <td style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    <button className="btn btn-sm btn-ghost" onClick={() => handleToggle(a.username)}>{a.is_active!==false?'停用':'启用'}</button>
                    <button className="btn btn-sm btn-ghost" onClick={() => { setResetTarget(a.username); setNewPwd(''); }}>重置密码</button>
                    <button className="btn btn-sm btn-red" onClick={() => handleDelete(a.username)}>删除</button>
                  </td>
                </tr>
              ))}
              {filtered.length === 0 && <tr><td colSpan="8" className="empty">无数据</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {/* Create Modal */}
      {showCreate && (
        <div className="modal-overlay" onClick={e => { if(e.target === e.currentTarget) setShowCreate(false); }}>
          <div className="modal">
            <h3>新建账号</h3>
            <div className="form-row">
              <div className="form-field"><label>用户名 *</label><input value={form.username} onChange={e => setForm({...form, username:e.target.value})} /></div>
              <div className="form-field"><label>密码 *</label><input type="password" value={form.password} onChange={e => setForm({...form, password:e.target.value})} /></div>
            </div>
            <div className="form-row">
              <div className="form-field"><label>角色</label>
                <select value={form.role} onChange={e => setForm({...form, role:e.target.value})}>
                  <option value="admin">admin</option>
                  <option value="hr">hr</option>
                  <option value="manager">manager</option>
                  <option value="warehouse_manager">warehouse_manager</option>
                  <option value="user">user</option>
                </select>
              </div>
              <div className="form-field"><label>显示名称</label><input value={form.display_name} onChange={e => setForm({...form, display_name:e.target.value})} /></div>
            </div>
            <div className="form-row">
              <div className="form-field"><label>员工ID</label><input value={form.employee_id} onChange={e => setForm({...form, employee_id:e.target.value})} /></div>
              <div className="form-field"><label>仓库编码</label><input value={form.warehouse_code} onChange={e => setForm({...form, warehouse_code:e.target.value})} /></div>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
              <button className="btn btn-ghost" onClick={() => setShowCreate(false)}>取消</button>
              <button className="btn btn-pri" onClick={handleCreate}>创建</button>
            </div>
          </div>
        </div>
      )}

      {/* Reset Password Modal */}
      {resetTarget && (
        <div className="modal-overlay" onClick={e => { if(e.target === e.currentTarget) setResetTarget(null); }}>
          <div className="modal">
            <h3>重置密码 — {resetTarget}</h3>
            <div className="form-row">
              <div className="form-field"><label>新密码</label><input type="password" value={newPwd} onChange={e => setNewPwd(e.target.value)} /></div>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
              <button className="btn btn-ghost" onClick={() => setResetTarget(null)}>取消</button>
              <button className="btn btn-pri" onClick={handleResetPwd}>确认重置</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────────── Permission Management ─────────────── */
function Permissions(){
  const [roles, setRoles] = useState([]);
  const [perms, setPerms] = useState([]);
  const [activeRole, setActiveRole] = useState('');
  const [saving, setSaving] = useState(false);

  const permKeys = ['can_view','can_create','can_edit','can_delete','can_export','can_approve','can_import'];
  const permLabels = {can_view:'查看',can_create:'创建',can_edit:'编辑',can_delete:'删除',can_export:'导出',can_approve:'审批',can_import:'导入'};
  const scopeOptions = [
    {value:'all', label:'全部数据'},
    {value:'own_warehouse', label:'本仓库'},
    {value:'own_department', label:'本部门'},
    {value:'own_supplier', label:'本供应商'},
    {value:'self_only', label:'仅自己'},
  ];

  useEffect(() => {
    Promise.all([API.get('/api/roles'), API.get('/api/permissions')]).then(([r, p]) => {
      if(r) setRoles(r);
      if(p) setPerms(p);
      if(r && r.length > 0) setActiveRole(r[0].role);
    });
  }, []);

  const rolePerms = perms.filter(p => p.role === activeRole);
  const modules = [...new Set(perms.map(p => p.module))];

  const getPerm = (module) => rolePerms.find(p => p.module === module) || {};

  const handleToggle = async (module, key) => {
    const current = getPerm(module);
    const payload = {role: activeRole, module};
    permKeys.forEach(k => { payload[k] = current[k] || false; });
    payload.data_scope = current.data_scope || 'self_only';
    payload[key] = !payload[key];
    setSaving(true);
    const r = await API.post('/api/permissions/update', payload);
    if(r){
      const updated = await API.get('/api/permissions');
      if(updated) setPerms(updated);
    }
    setSaving(false);
  };

  const handleScope = async (module, scope) => {
    const current = getPerm(module);
    const payload = {role: activeRole, module, data_scope: scope};
    permKeys.forEach(k => { payload[k] = current[k] || false; });
    setSaving(true);
    const r = await API.post('/api/permissions/update', payload);
    if(r){
      const updated = await API.get('/api/permissions');
      if(updated) setPerms(updated);
    }
    setSaving(false);
  };

  return (
    <div className="fade">
      <h2 style={{marginBottom:12}}>🔐 权限管理</h2>
      <div className="tabs">
        {roles.map(r => (
          <div key={r.role} className={'tab'+(activeRole===r.role?' active':'')} onClick={() => setActiveRole(r.role)}>
            {r.label || r.role}
          </div>
        ))}
      </div>
      {modules.length === 0 ? <div className="empty">暂无权限数据</div> : (
        <div className="card">
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>模块</th>
                  {permKeys.map(k => <th key={k} style={{textAlign:'center'}}>{permLabels[k]}</th>)}
                  <th>数据范围</th>
                </tr>
              </thead>
              <tbody>
                {modules.map(m => {
                  const p = getPerm(m);
                  return (
                    <tr key={m}>
                      <td style={{fontWeight:600}}>{m}</td>
                      {permKeys.map(k => (

                          onChange={e => handleScope(m, e.target.value)}

                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────────── File Management ─────────────── */
function Files(){
  const [files, setFiles] = useState([]);
  const [employees, setEmployees] = useState([]);
  const [showUpload, setShowUpload] = useState(false);
  const [search, setSearch] = useState('');
  const [uploading, setUploading] = useState(false);
  const [uploadForm, setUploadForm] = useState({employee_id:'', category:'身份证件'});
  const fileRef = useRef(null);

  const categories = ['身份证件','学历证书','合同','简历','体检报告','离职证明','其他'];

  const load = () => {
    Promise.all([API.get('/api/files'), API.get('/api/employees')]).then(([f, e]) => {
      if(f) setFiles(f);
      if(e) setEmployees(e);
    });
  };
  useEffect(() => { load(); }, []);

  const filtered = files.filter(f =>
    (f.file_name||'').includes(search) || (f.employee_id||'').toString().includes(search) || (f.category||'').includes(search)
  );

  const handleUpload = async () => {
    const fileInput = fileRef.current;
    if(!fileInput || !fileInput.files[0]){ showToast('请选择文件','error'); return; }
    if(!uploadForm.employee_id){ showToast('请选择员工','error'); return; }

    setUploading(true);
    try {
      const fd = new FormData();
      fd.append('file', fileInput.files[0]);
      fd.append('category', uploadForm.category);

      const uploadRes = await fetch('/api/upload', {
        method: 'POST',
        headers: {'Authorization': 'Bearer ' + API.token},
        body: fd,
      });
      const uploadData = await uploadRes.json().catch(() => ({}));
      if(!uploadRes.ok){ showToast(uploadData.detail || '上传失败','error'); setUploading(false); return; }

      const saveRes = await API.post('/api/files', {
        employee_id: uploadForm.employee_id,
        file_name: uploadData.filename || fileInput.files[0].name,
        file_url: uploadData.url || '',
        file_type: fileInput.files[0].type || 'application/octet-stream',
        file_size: uploadData.size || fileInput.files[0].size,
        category: uploadForm.category,
        stage: '在职',
      });
      if(saveRes){ showToast('文件已上传'); setShowUpload(false); load(); }
    } catch(err){
      showToast('上传出错: '+err.message,'error');
    }
    setUploading(false);
  };

  const handleDownload = async (file) => {
    try {
      const r = await fetch('/api/files/'+file.id+'/download', {
        headers: {'Authorization': 'Bearer ' + API.token},
      });
      if(!r.ok){ showToast('下载失败','error'); return; }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = file.file_name || 'download';
      a.click();
      URL.revokeObjectURL(url);
    } catch(err){ showToast('下载出错','error'); }
  };

  const handleFolderDownload = async (employeeId) => {
    try {
      const r = await fetch('/api/files/download-folder/'+encodeURIComponent(employeeId), {
        headers: {'Authorization': 'Bearer ' + API.token},
      });
      if(!r.ok){ showToast('下载失败','error'); return; }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = employeeId + '_files.zip';
      a.click();
      URL.revokeObjectURL(url);
    } catch(err){ showToast('下载出错','error'); }
  };

  const empGroups = [...new Set(files.map(f => f.employee_id).filter(Boolean))];

  return (
    <div className="fade">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <h2>📁 文件管理</h2>
        <button className="btn btn-pri" onClick={() => setShowUpload(true)}>+ 上传文件</button>
      </div>
      <div className="search-bar">
        <input placeholder="搜索文件名 / 员工ID / 分类..." value={search} onChange={e => setSearch(e.target.value)} />
        {empGroups.length > 0 && (
          <select onChange={e => { if(e.target.value) handleFolderDownload(e.target.value); e.target.value=''; }}
            style={{minWidth:180,padding:'7px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13}}>
            <option value="">📦 批量下载员工文件夹...</option>
            {empGroups.map(eid => <option key={eid} value={eid}>员工 {eid}</option>)}
          </select>
        )}
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>文件名</th><th>员工ID</th><th>分类</th><th>类型</th><th>大小</th><th>阶段</th><th>操作</th></tr></thead>
            <tbody>
              {filtered.map(f => (
                <tr key={f.id}>
                  <td style={{fontWeight:600,maxWidth:220,overflow:'hidden',textOverflow:'ellipsis'}}>{f.file_name}</td>
                  <td>{f.employee_id || '-'}</td>
                  <td><span className="badge-s bg-cyan">{f.category || '-'}</span></td>
                  <td>{f.file_type || '-'}</td>
                  <td>{f.file_size ? (f.file_size/1024).toFixed(1)+'KB' : '-'}</td>
                  <td>{f.stage || '-'}</td>
                  <td><button className="btn btn-sm btn-ghost" onClick={() => handleDownload(f)}>下载</button></td>
                </tr>
              ))}
              {filtered.length === 0 && <tr><td colSpan="7" className="empty">无文件</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {showUpload && (
        <div className="modal-overlay" onClick={e => { if(e.target === e.currentTarget) setShowUpload(false); }}>
          <div className="modal">
            <h3>上传文件</h3>
            <div className="form-row">
              <div className="form-field">
                <label>选择员工 *</label>
                <select value={uploadForm.employee_id} onChange={e => setUploadForm({...uploadForm, employee_id:e.target.value})}>
                  <option value="">-- 请选择 --</option>
                  {employees.map(emp => (
                    <option key={emp.employee_id || emp.id} value={emp.employee_id || emp.id}>
                      {emp.employee_id || emp.id} - {emp.name || emp.display_name || ''}
                    </option>
                  ))}
                </select>
              </div>
              <div className="form-field">
                <label>文件分类</label>
                <select value={uploadForm.category} onChange={e => setUploadForm({...uploadForm, category:e.target.value})}>
                  {categories.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-field">
                <label>选择文件 *</label>
                <input type="file" ref={fileRef} style={{padding:6}} />
              </div>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
              <button className="btn btn-ghost" onClick={() => setShowUpload(false)}>取消</button>
              <button className="btn btn-pri" disabled={uploading} onClick={handleUpload}>{uploading ? '上传中...' : '上传'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

};

const PAGE_TITLES = {
  dashboard:'仪表盘',accounts:'账号管理',permissions:'权限管理',
  warehouses:'仓库管理',regions:'大区管理',files:'文件管理',cloud:'云文档集成',
};

function AdminApp(){
  const [page, setPage] = useState('dashboard');
  const [sideOpen, setSideOpen] = useState(false);

  const user = React.useMemo(() => {
    try { return JSON.parse(localStorage.getItem('hr_user')) || {}; }
    catch { return {}; }
  }, []);

  const token = localStorage.getItem('hr_token');

  if(!token || !user.username){
    window.location.href = '/index.html';
    return null;
  }

  if(user.role !== 'admin'){
    return <AccessDenied />;
  }

  const navigate = (key) => { setPage(key); setSideOpen(false); };
  const PageComponent = PAGES[page] || Dashboard;

  const handleLogout = () => {
    localStorage.removeItem('hr_token');
    localStorage.removeItem('hr_user');
    window.location.href = '/index.html';
  };

  return (
    <div className="app">
      {/* Mobile mask */}
      <div className={'sidebar-mask'+(sideOpen?' show':'')} onClick={() => setSideOpen(false)} />

      {/* Sidebar */}
      <div className={'sidebar'+(sideOpen?' open':'')}>
        <div className="logo">
          渊博579 管理后台
          <small>Admin Panel</small>
        </div>
        {NAV.map(g => (
          <React.Fragment key={g.group}>
            <div className="nav-group">{g.group}</div>
            {g.items.map(item => (
              <div key={item.key} className={'nav-item'+(page===item.key?' active':'')} onClick={() => navigate(item.key)}>
                <span>{item.icon}</span> {item.label}
              </div>
            ))}
          </React.Fragment>
        ))}
        <div className="sidebar-footer">
          <a href="/index.html">← 回到用户界面</a>
          <button onClick={handleLogout}>🚪 退出登录</button>
        </div>
      </div>

      {/* Main content */}
      <div className="main">
        <div className="header">
          <div className="menu-btn" onClick={() => setSideOpen(!sideOpen)}>☰</div>
          <div className="title">{PAGE_TITLES[page] || '管理后台'}</div>
          <div className="user-info">
            <span>{user.display_name || user.username}</span>
            <span className="badge">{user.role}</span>
          </div>
        </div>
        <div className="content">
          <PageComponent key={page} />
        </div>
      </div>
    </div>
  );
}

/* ── Mount ── */
ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
</script>
</body>
</html>
